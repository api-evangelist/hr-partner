        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Applicant' }
      responses:
        '200':
          description: Updated applicant.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Applicant' }
  /applications:
    get:
      tags: [Applications]
      operationId: listApplications
      summary: List Applications
      description: List job applications.
      responses:
        '200':
          description: List of applications.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Application' } }
    post:
      tags: [Applications]
      operationId: createApplication
      summary: Create Application
      description: Create a new job application.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Application' }
      responses:
        '200':
          description: Created application.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Application' }
  /applications/{id}:
    get:
      tags: [Applications]
      operationId: getApplication
      summary: Get Application
      description: Retrieve a single application by id.
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }

  /dependents:
    get:
      tags: [Dependents]
      operationId: listDependents
      summary: List Dependents
      description: List employee dependent records.
      responses:
        '200':
          description: List of dependents.
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/Dependent' } }
  /grievances:
    get:
      tags: [Grievances]

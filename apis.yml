apis:
  - aid: hr-partner:rest-api
    name: HR Partner REST API
    description: >-
      Public REST API for HR Partner, covering employee records and sub-modules
      (contacts, addresses, notes, education, skills, training, assets, benefits,
      dependents, grievances, positions, renewables, attachments), leave
      management (requests, balances, absences), timesheets and projects,
      expenses, recruitment (job listings, applicants, applications,
      application-stage tracking, interviews), performance (reviews, goals),
      checklists, reminders, document library, lookups, and company information.
      Authentication is via API key passed in the x-api-key header. Rate limits
      are 60 GET/POST requests per second and 900 requests per one-minute burst,
      with HTTPS required.
    humanURL: https://developer.hrpartner.io/

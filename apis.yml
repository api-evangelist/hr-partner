aid: hr-partner
name: HR Partner
description: >-
  HR Partner is a cloud-based human resources management SaaS platform from
  HR Partner Software Pty Ltd (Australia), aimed at organizations of roughly
  20 to 500 employees. The platform covers employee records, recruitment and
  applicant tracking, onboarding and training checklists, leave requests and
  accruals, an employee self-service portal, performance reviews and goals,
  electronic signatures, expense claims, timesheets, document library,
  organizational chart, company calendar, and HR reports. HR Partner exposes
  a single public REST API at api.hrpartner.io, authenticated via per-account
  API key (x-api-key header), with rate limits of 60 requests/second and a
  900 requests-per-minute burst ceiling. The API is read-mostly with selected
  write endpoints for employees, applicants, applications, timesheets, and
  reminders, and is described as being in an early release phase.

naftiko: 1.0.0-alpha2
info:
  label: HR Partner — Expenses
  description: 'HR Partner — Expenses. Read employee expense claims.'
  tags:
    - HR Partner
    - Expenses
  created: '2026-05-23'
  modified: '2026-05-23'
binds:
  - namespace: env
    keys:
      HR_PARTNER_API_KEY: HR_PARTNER_API_KEY
capability:
  consumes:
    - type: http
      namespace: hr-partner-expenses
      baseUri: https://api.hrpartner.io
      description: HR Partner Expenses business capability.
      resources:
        - name: expenses
          path: /expenses
          operations:
            - { name: listExpenses, method: GET, description: List Expense Claims, outputRawFormat: json, outputParameters: [{ name: result, type: array, value: '$.' }] }
      authentication:
        type: header
        header: x-api-key
        value: '{{env.HR_PARTNER_API_KEY}}'
  exposes:
    - type: mcp
      namespace: hr-partner-expenses-mcp
      port: 9090
      transport: http
      description: MCP adapter for HR Partner Expenses.
      tools:
        - { name: list_expenses, description: List employee expense claims, call: hr-partner-expenses.listExpenses }
